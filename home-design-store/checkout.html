<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | LuxeDecor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">LuxeDecor</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <span class="icon">🔍</span>
                <a href="index.html" class="cart-link"><span class="icon">🛒</span></a>
            </div>
        </nav>
    </header>

    <main class="checkout-container">
        <section class="cart-summary">
            <h2>Your Shopping Cart</h2>
            <div id="cart-items-list">
                <!-- Cart items will be injected here -->
            </div>
            <div class="cart-total">
                <h3>Total: <span id="cart-total-amount">$0.00</span></h3>
            </div>
        </section>

        <section class="checkout-form">
            <h2>Shipping & Payment</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="address">Shipping Address</label>
                    <input type="text" id="address" required placeholder="123 Design St, Decor City">
                </div>
                <div class="form-group">
                    <label for="card-number">Card Number</label>
                    <input type="text" id="card-number" required placeholder="1234 5678 1234 5678">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="expiry">Expiry (MM/YY)</label>
                        <input type="text" id="expiry" required placeholder="12/25">
                    </div>
                    <div class="form-group">
                        <label for="cvv">CVV</label>
                        <input type="text" id="cvv" required placeholder="123">
                    </div>
                </div>
                <button type="submit" class="cta-button checkout-btn">Complete Purchase</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 LuxeDecor. All rights reserved.</p>
        </div>
    </footer>

    <script src="checkout.js"></script>
</body>
</html>
